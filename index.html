<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross-Sell Revenue Opportunity Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0B1120; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #1E293B; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid #0B1120; }
  input[type="range"].blue::-webkit-slider-thumb { background: #3B82F6; }
  input[type="range"].green::-webkit-slider-thumb { background: #10B981; }
  input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid #0B1120; }
  input[type="range"].blue::-moz-range-thumb { background: #3B82F6; }
  input[type="range"].green::-moz-range-thumb { background: #10B981; }
  table { width: 100%; border-collapse: collapse; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend } = Recharts;

const DATA = {"total_accounts":564,"monoline_accounts":440,"multiline_accounts":124,"monoline_pct":78.0,"personal_mono":336,"commercial_mono":102,"total_opps":1401,"total_premium_potential":3579390,"total_commission_potential":429526,"monoline_current_premium":1274090,"by_product":[{"name":"Personal Auto","count":294,"premium":877884,"commission":105346},{"name":"Umbrella","count":322,"premium":587328,"commission":70479},{"name":"Homeowners","count":148,"premium":584304,"commission":70116},{"name":"Workers' Comp","count":93,"premium":524148,"commission":62897},{"name":"Commercial Auto","count":93,"premium":431706,"commission":51804},{"name":"Flood","count":190,"premium":224010,"commission":26881},{"name":"Commercial Property","count":89,"premium":223924,"commission":26870},{"name":"Life","count":154,"premium":77000,"commission":9240},{"name":"General Liability","count":18,"premium":49086,"commission":5890}],"by_current_lob":[{"name":"Homeowners","count":155,"premium":649301},{"name":"General Liability","count":85,"premium":242153},{"name":"Life","count":74,"premium":215},{"name":"Personal Auto","count":44,"premium":152038},{"name":"Dwelling/Property","count":38,"premium":142262},{"name":"Flood","count":16,"premium":23392},{"name":"Commercial Property","count":7,"premium":22845},{"name":"Bond","count":5,"premium":815},{"name":"Inland Marine/Specialty","count":4,"premium":0},{"name":"Watercraft","count":4,"premium":6951},{"name":"Commercial Auto","count":3,"premium":10028},{"name":"Workers' Comp","count":2,"premium":9437},{"name":"Group Benefits","count":1,"premium":11000},{"name":"Other","count":1,"premium":3063},{"name":"Umbrella","count":1,"premium":591}],"by_producer":[{"name":"Mary Huggins","count":118,"premium":369471},{"name":"Naomi Gentry","count":101,"premium":397748},{"name":"Michelle Howe","count":82,"premium":336398},{"name":"Jack Lebor","count":16,"premium":53022},{"name":"Huggins Mary--New Kite","count":9,"premium":15154},{"name":"Christina Avila","count":9,"premium":21330}],"avg_premiums":{"Homeowners":3948,"Flood":1179,"Personal Auto":2986,"Umbrella":1824,"Life":500,"Dwelling/Property":2441,"General Liability":2727,"Commercial Auto":4642,"Workers' Comp":5636,"Commercial Property":2516,"Watercraft":1216,"Bond":293,"Inland Marine/Specialty":1001,"Mobile Homeowners":1600,"Group Benefits":3667}};

const fmt = (n) => n >= 1000000 ? `$${(n/1000000).toFixed(1)}M` : n >= 1000 ? `$${(n/1000).toFixed(0)}K` : `$${n}`;
const fmtFull = (n) => `$${n.toLocaleString()}`;

const C = {
  bg: "#0B1120", card: "#111827", border: "#1E293B", accent: "#3B82F6",
  green: "#10B981", amber: "#F59E0B", red: "#EF4444", purple: "#8B5CF6",
  cyan: "#06B6D4", text: "#F1F5F9", muted: "#94A3B8", dim: "#64748B",
};
const CC = ["#3B82F6","#10B981","#F59E0B","#EF4444","#8B5CF6","#06B6D4","#EC4899","#F97316","#14B8A6"];

const Tip = ({ active, payload, label, formatter }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 14px", fontSize: 13 }}>
      <div style={{ color: C.text, fontWeight: 600, marginBottom: 4 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ color: p.color || C.muted, marginTop: 2 }}>
          {p.name}: {formatter ? formatter(p.value) : p.value}
        </div>
      ))}
    </div>
  );
};

function Dashboard() {
  const [penetration, setPenetration] = useState(40);
  const [closeRate, setCloseRate] = useState(20);
  const [view, setView] = useState("overview");

  const scenario = useMemo(() => {
    const p = penetration / 100, c = closeRate / 100;
    return {
      accounts_targeted: Math.round(DATA.monoline_accounts * p),
      policies_sold: Math.round(DATA.total_opps * p * c),
      premium: Math.round(DATA.total_premium_potential * p * c),
      commission: Math.round(DATA.total_commission_potential * p * c),
      by_product: DATA.by_product.map(bp => ({
        ...bp,
        adj_premium: Math.round(bp.premium * p * c),
        adj_commission: Math.round(bp.commission * p * c),
        adj_count: Math.round(bp.count * p * c),
      }))
    };
  }, [penetration, closeRate]);

  const pieData = [
    { name: "Personal", value: DATA.personal_mono, color: C.accent },
    { name: "Commercial", value: DATA.commercial_mono, color: C.green },
  ];
  const monoDonut = [
    { name: "Monoline", value: DATA.monoline_accounts, color: C.red },
    { name: "Multi-line", value: DATA.multiline_accounts, color: C.green },
  ];

  const maxWidth = 900;

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, padding: "32px 20px" }}>
      <div style={{ maxWidth, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <div style={{ width: 8, height: 32, borderRadius: 4, background: `linear-gradient(180deg, ${C.accent}, ${C.purple})` }} />
            <h1 style={{ fontSize: 24, fontWeight: 700, letterSpacing: "-0.5px" }}>Cross-Sell Revenue Opportunity</h1>
          </div>
          <p style={{ color: C.muted, fontSize: 14, paddingLeft: 18 }}>Monoline Client Analysis & Pipeline Projections</p>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 24, background: C.card, borderRadius: 10, padding: 4, border: `1px solid ${C.border}` }}>
          {[["overview","Overview"],["products","Products"],["producers","Producers"]].map(([k,l]) => (
            <button key={k} onClick={() => setView(k)} style={{
              flex: 1, padding: "10px 0", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600,
              background: view === k ? C.accent : "transparent", color: view === k ? "#fff" : C.muted, transition: "all 0.2s"
            }}>{l}</button>
          ))}
        </div>

        {view === "overview" && <>
          {/* KPIs */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Total Accounts", value: DATA.total_accounts, sub: null, color: C.accent },
              { label: "Monoline Clients", value: DATA.monoline_accounts, sub: `${DATA.monoline_pct}% of book`, color: C.red },
              { label: "Premium Potential", value: fmt(DATA.total_premium_potential), sub: "at 100% close", color: C.green },
              { label: "Commission Potential", value: fmt(DATA.total_commission_potential), sub: "at 12% avg", color: C.purple },
            ].map((kpi, i) => (
              <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 16px", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: kpi.color }} />
                <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: "0.5px", fontWeight: 600, marginBottom: 6 }}>{kpi.label}</div>
                <div style={{ fontSize: 26, fontWeight: 700 }}>{kpi.value}</div>
                {kpi.sub && <div style={{ fontSize: 11, color: C.dim, marginTop: 2 }}>{kpi.sub}</div>}
              </div>
            ))}
          </div>

          {/* Donut charts */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
            {[{ title: "Book Composition", data: monoDonut }, { title: "Monoline by Type", data: pieData }].map((chart, ci) => (
              <div key={ci} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.5px" }}>{chart.title}</div>
                <ResponsiveContainer width="100%" height={170}>
                  <PieChart>
                    <Pie data={chart.data} dataKey="value" innerRadius={45} outerRadius={65} paddingAngle={3} startAngle={90} endAngle={-270}>
                      {chart.data.map((d, i) => <Cell key={i} fill={d.color} stroke="none" />)}
                    </Pie>
                    <Legend iconType="circle" iconSize={8} wrapperStyle={{ fontSize: 11, color: C.muted }} />
                    <Tooltip content={<Tip />} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            ))}
          </div>

          {/* Scenario Builder */}
          <div style={{ background: `linear-gradient(135deg, ${C.card} 0%, #1a1f35 100%)`, border: `1px solid ${C.accent}33`, borderRadius: 12, padding: 24, marginBottom: 20 }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 20 }}>⚡</span> Revenue Scenario Builder
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 24 }}>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, color: C.muted }}>Penetration Rate</span>
                  <span style={{ fontSize: 16, fontWeight: 700, color: C.accent }}>{penetration}%</span>
                </div>
                <input type="range" className="blue" min={10} max={80} value={penetration} onChange={e => setPenetration(+e.target.value)} />
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.dim, marginTop: 4 }}><span>10%</span><span>80%</span></div>
              </div>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, color: C.muted }}>Close Rate</span>
                  <span style={{ fontSize: 16, fontWeight: 700, color: C.green }}>{closeRate}%</span>
                </div>
                <input type="range" className="green" min={5} max={50} value={closeRate} onChange={e => setCloseRate(+e.target.value)} />
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.dim, marginTop: 4 }}><span>5%</span><span>50%</span></div>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
              {[
                { label: "Projected New Premium", value: fmtFull(scenario.premium), color: C.green },
                { label: "Projected Commission", value: fmtFull(scenario.commission), color: C.amber },
                { label: "Policies Sold", value: scenario.policies_sold.toLocaleString(), color: C.accent },
                { label: "Accounts Targeted", value: scenario.accounts_targeted.toLocaleString(), color: C.purple },
              ].map((item, i) => (
                <div key={i} style={{ background: `${item.color}15`, border: `1px solid ${item.color}30`, borderRadius: 10, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.5px" }}>{item.label}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: item.color }}>{item.value}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Monoline table */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.5px" }}>Monoline Accounts by Current Policy Type</div>
            <table style={{ fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                  <th style={{ textAlign: "left", padding: "8px 8px", color: C.dim, fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>Policy Type</th>
                  <th style={{ textAlign: "right", padding: "8px 8px", color: C.dim, fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>Clients</th>
                  <th style={{ textAlign: "right", padding: "8px 8px", color: C.dim, fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>Current Premium</th>
                </tr>
              </thead>
              <tbody>
                {DATA.by_current_lob.slice(0,10).map((row, i) => (
                  <tr key={i} style={{ borderBottom: `1px solid ${C.border}22` }}>
                    <td style={{ padding: "10px 8px", fontWeight: 500 }}>
                      <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 4, background: CC[i%CC.length], marginRight: 10 }} />
                      {row.name}
                    </td>
                    <td style={{ textAlign: "right", padding: "10px 8px", color: C.muted }}>{row.count}</td>
                    <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 600 }}>{fmt(row.premium)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}

        {view === "products" && <>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.5px" }}>Premium Opportunity by Cross-Sell Product</div>
            <div style={{ fontSize: 11, color: C.dim, marginBottom: 14 }}>Adjusted for {penetration}% penetration × {closeRate}% close rate</div>
            <ResponsiveContainer width="100%" height={340}>
              <BarChart data={scenario.by_product} layout="vertical" margin={{ left: 10, right: 10 }}>
                <XAxis type="number" tickFormatter={fmt} tick={{ fill: C.dim, fontSize: 11 }} axisLine={false} tickLine={false} />
                <YAxis type="category" dataKey="name" width={120} tick={{ fill: C.muted, fontSize: 12 }} axisLine={false} tickLine={false} />
                <Tooltip content={<Tip formatter={fmtFull} />} />
                <Bar dataKey="adj_premium" name="Projected Premium" radius={[0,6,6,0]} barSize={22}>
                  {scenario.by_product.map((_, i) => <Cell key={i} fill={CC[i%CC.length]} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.5px" }}>Cross-Sell Product Detail</div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ fontSize: 12 }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                    {["Product","Avg Premium","Opps","Proj. Premium","Proj. Commission"].map((h,i) => (
                      <th key={i} style={{ textAlign: i === 0 ? "left" : "right", padding: "8px 8px", color: C.dim, fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {scenario.by_product.map((row, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${C.border}22` }}>
                      <td style={{ padding: "10px 8px", fontWeight: 500 }}>
                        <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 4, background: CC[i%CC.length], marginRight: 8 }} />
                        {row.name}
                      </td>
                      <td style={{ textAlign: "right", padding: "10px 8px", color: C.muted }}>{fmtFull(DATA.avg_premiums[row.name]||0)}</td>
                      <td style={{ textAlign: "right", padding: "10px 8px", color: C.muted }}>{row.count}</td>
                      <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 600, color: C.green }}>{fmt(row.adj_premium)}</td>
                      <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 600, color: C.amber }}>{fmt(row.adj_commission)}</td>
                    </tr>
                  ))}
                  <tr style={{ borderTop: `2px solid ${C.border}` }}>
                    <td style={{ padding: "10px 8px", fontWeight: 700 }}>Total</td>
                    <td></td>
                    <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 700 }}>{scenario.policies_sold}</td>
                    <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 700, color: C.green }}>{fmt(scenario.premium)}</td>
                    <td style={{ textAlign: "right", padding: "10px 8px", fontWeight: 700, color: C.amber }}>{fmt(scenario.commission)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.5px" }}>Average Premium by Line of Business</div>
            <div style={{ fontSize: 11, color: C.dim, marginBottom: 14 }}>Based on your current book averages (Life adjusted to $500 industry est.)</div>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={Object.entries(DATA.avg_premiums).map(([k,v])=>({name:k,premium:v})).sort((a,b)=>b.premium-a.premium)} layout="vertical" margin={{ left: 10, right: 10 }}>
                <XAxis type="number" tickFormatter={fmt} tick={{ fill: C.dim, fontSize: 11 }} axisLine={false} tickLine={false} />
                <YAxis type="category" dataKey="name" width={130} tick={{ fill: C.muted, fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip content={<Tip formatter={fmtFull} />} />
                <Bar dataKey="premium" name="Avg Premium" fill={C.accent} radius={[0,6,6,0]} barSize={18} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>}

        {view === "producers" && <>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.5px" }}>Monoline Accounts by Producer</div>
            <div style={{ fontSize: 11, color: C.dim, marginBottom: 14 }}>Cross-sell pipeline assigned to each producer</div>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={DATA.by_producer} margin={{ left: 0, right: 10 }}>
                <XAxis dataKey="name" tick={{ fill: C.muted, fontSize: 10 }} axisLine={false} tickLine={false} angle={-15} textAnchor="end" height={55} />
                <YAxis tick={{ fill: C.dim, fontSize: 11 }} axisLine={false} tickLine={false} />
                <Tooltip content={<Tip />} />
                <Bar dataKey="count" name="Monoline Clients" radius={[6,6,0,0]} barSize={36}>
                  {DATA.by_producer.map((_,i) => <Cell key={i} fill={CC[i%CC.length]} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.5px" }}>Producer Detail</div>
            {DATA.by_producer.map((p, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0", borderBottom: i < DATA.by_producer.length - 1 ? `1px solid ${C.border}22` : "none" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14, display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 30, height: 30, borderRadius: "50%", background: `${CC[i]}22`, color: CC[i], fontSize: 12, fontWeight: 700 }}>{i+1}</span>
                    {p.name}
                  </div>
                  <div style={{ fontSize: 12, color: C.dim, marginTop: 2, paddingLeft: 40 }}>{p.count} monoline accounts</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 600, color: C.green, fontSize: 16 }}>{fmt(p.premium)}</div>
                  <div style={{ fontSize: 11, color: C.dim }}>current premium</div>
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* Footer */}
        <div style={{ marginTop: 24, padding: "14px 0", borderTop: `1px solid ${C.border}`, textAlign: "center" }}>
          <div style={{ fontSize: 11, color: C.dim }}>
            Analysis based on {DATA.total_accounts} accounts · {DATA.by_product.reduce((s,p)=>s+p.count,0)} cross-sell opportunities · 12% avg commission rate
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById("root"));
</script>
</body>
</html>
